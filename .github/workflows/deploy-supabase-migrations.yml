name: Deploy Supabase migrations

# Applies supabase/migrations/** to the PRODUCTION project via `supabase db push`.
# The native Supabase<->GitHub integration only powers PR preview branches — this is
# what actually deploys schema to production on push to main.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions -> New secret):
#   SUPABASE_ACCESS_TOKEN  - Supabase account token (dashboard -> Account -> Access Tokens)
#   SUPABASE_DB_PASSWORD   - the project's database password (Project Settings -> Database)
# The project ref below is not a secret (it's the subdomain of your project URL).

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch: {}

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: zbdmmdzqwaynijspbacu
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Push migrations
        run: supabase db push
