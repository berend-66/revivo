value":"PT20M"}},"price":"15.00","priceCurrency":"EUR"},{"@type":"Offer","itemOffered":{"@type":"Service","name":"Kinderen t/m 10 jaar - knippen","description":"Als het haar van jouw kindje voor het eerst geknipt moet worden, kan dit voor jullie allebei spannend zijn. Maar met de juiste voorbereidingen kan het juist een heel gezellig en speciaal uitje worden. Terwijl jij mogelijk een emotioneel moment hebt omdat de eerste dunne lokjes worden afgeknipt, kan de peuter juist een beetje bang worden van alle nieuwe geluiden, indrukken en sensaties. Maar maak je geen zorgen, met de juiste voorbereiding zal de behandeling een fluitje van een cent zijn.","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT20M"}},"price":"20.00","priceCurrency":"EUR"}]},{"@type":"OfferCatalog","name":"Kleuren","itemListElement":[{"@type":"AggregateOffer","itemOffered":{"@type":"Service","name":"Kleuren - uitgroei","description":"\nOlaplex herstelt haarbeschadiging dat is veroorzaakt door chemische of thermische beschadiging. Olaplex is in staat om gebroken zwavelbruggen in je haar op te sporen en je haar van binnenuit te herstellen. Een Olaplex-behandeling kan ook worden ingezet om gezond haar te behouden of om beschadiging te voorkomen.\n\n","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT1H"}},"lowPrice":"50.00","highPrice":"60.00","priceCurrency":"EUR"},{"@type":"AggregateOffer","itemOffered":{"@type":"Service","name":"Kleuren - Eén kleur - vanaf","description":"\nLet op: de genoemde prijs is een vanaf-prijs. De definitieve prijs is onder andere afhankelijk van je persoonlijke wensen en hoor je in de salon. Betaal je online? Dan wordt het eventuele prijsverschil verrekend in de salon.\n\n","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT1H"}},"lowPrice":"33.75","highPrice":"60.00","priceCurrency":"EUR"},{"@type":"AggregateOffer","itemOffered":{"@type":"Service","name":"Kleuren - Eén kleur -met Olaplex-behandeling pe":"Service","name":"Threaden - wenkbrauwen","description":"Denk je dat strakke wenkbrauwen niet voor jou zijn weggelegd? Met threading of epileren krijg je gelukkig wel die volle, perfecte wenkbrauwen. Bij threading wordt er gebruik gemaakt van 2 dunne garen die in elkaar worden gedraaid en over het huidoppervlak worden gerold. Hierdoor worden de ongewenste haren op zeer precieze wijze vanaf de wortel verwijderd. Tijdens het epileren worden haartjes met een pincet verwijderd.","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT15M"}},"price":"15.00","priceCurrency":"EUR"},{"@type":"Offer","itemOffered":{"@type":"Service","name":"Threaden - bovenlip","description":"Wil jij perfect gevormde wenkbrauwen en een gezicht zonder donshaartjes? Dan is threading dé beautybehandeling voor jou. Het resultaat? Tot wel zes weken lang een glad en zacht gezicht zonder ongewenste haartjes. Bovendien is deze manier van epileren zeer precies en snel en kun je met touw zelfs de allerkleinste haartjes moeiteloos verwijderen. ","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT5M"}},"price":"5.00","priceCurrency":"EUR"},{"@type":"Offer","itemOffered":{"@type":"Service","name":"Threaden - kin","description":"Wil jij perfect gevormde wenkbrauwen en een gezicht zonder donshaartjes? Dan is threading dé beautybehandeling voor jou. Het resultaat? Tot wel zes weken lang een glad en zacht gezicht zonder ongewenste haartjes. Bovendien is deze manier van epileren zeer precies en snel en kun je met touw zelfs de allerkleinste haartjes moeiteloos verwijderen. ","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT5M"}},"price":"5.00","priceCurrency":"EUR"},{"@type":"Offer","itemOffered":{"@type":"Service","name":"Threaden - gezicht","description":"Wil jij perfect gevormde wenkbrauwen en een gezicht zonder donshaartjes? Dan is threading dé beautybehandeling voor jou. Het resultaat? Tot wel zes weken lang een glad en zacht gezicht zonder ongewenste haartjes. Bovendien is deze manier van epileren zeer precies en snel en kun je met touw zelfs de allerkleinste haartjes moeiteloos verwijderen. ","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT25M"}},"price":"25.00","priceCurrency":"EUR"}]},{"@type":"OfferCatalog","name":"Vrouwen - Highlights & Balayage","itemListElement":[{"@type":"Offer","itemOffered":{"@type":"Service","name":"Vrouwen - highlights  vanaf","description":"\nLet op: de genoemde prijs is een vanaf-prijs. De definitieve prijs is onder andere afhankelijk van je persoonlijke wensen en hoor je in de salon. Betaal je online? Dan wordt het eventuele prijsverschil verrekend in de salon.\n\n\nHighlights zijn lichte accenten in je haar. Deze worden aangebracht door middel van de folietechniek. Je kunt zelf bepalen hoeveel plukken je wilt en hoe dik de plukken moeten zijn. In principe kan je voor elke folie een andere kleur gebruiken waardoor je veel verschillende tinten krijgt. Het voordeel van highlights ten opzichte van een coupe soleil is dat je de volgende keer heel gericht dezelfde plukje kunt pakken en deze weer kunt oplichten. Een ander voordeel van highlights is dat je dichter bij de aanzet kunt komen waardoor je minder snel een uitgroei krijgt.\n\n","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT2H"}},"price":"55.00","priceCurrency":"EUR"},{"@type":"Offer","itemOffered":{"@type":"Service","name":"Vrouwen - balayage  vanaf","description":"\nLet op: de genoemde prijs is een vanaf-prijs. Het eventuele prijsverschil wordt verrekend in de salon.\n\n\nBalayage is de Franse term voor het woord &lsquo;veeg&rsquo; of &lsquo;vegen&rsquo;. Er wordt bij een balayage namelijk alleen gebruik gemaakt van verf en een kwast en niet van folies. Met een klein borsteltje of applicator wordt de verf als het ware over het haar heen geveegd waardoor er subtiel kleurverschillen ontstaan. Het resultaat doet daarom denken aan een subtiele &lsquo;ombre&rsquo;, maar dan in de vorm van highlights.\n\n","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT2H30M"}},"price":"70.00","priceCurrency":"EUR"},{"@type":"Offer","itemOffered":{"@type":"Service","name":"Vrouwen - ombre - vanaf","description":"\nLet op: de genoemde prijs is een vanaf-prijs. Het eventuele prijsverschil wordt verrekend in de salon.\n\n\nBij de ombre worden highlights onderin het haar aangebracht. Hierdoor ontstaat er een kleurverschil: de bovenkant van het haar is donkerder dan de onderkant. Je kunt ook een omgekeerde ombre kiezen. Dan is de bovenkant van het haar lichter dan de onderkant. De ombre is de subtielere versie van de dip dye. Je ziet bij de ombre iets meer overloop tussen de twee kleuren.\n\n","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT2H"}},"price":"70.00","priceCurrency":"EUR"}]},{"@type":"OfferCatalog","name":"Wimpers & Wenkbrauwen","itemListElement":[{"@type":"Offer","itemOffered":{"@type":"Service","name":"Verven - wenkbrauwen","description":"\nHet verven van je wenkbrauwen maakt ze beter zichtbaar en geeft je gezicht meer expressie. Het resultaat blijft 3 &agrave; 6 weken zichtbaar.\n\n","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT15M"}},"price":"10.00","priceCurrency":"EUR"}]},{"@type":"OfferCatalog","name":"Mannen - Knippen & Styling","itemListElement":[{"@type":"Offer","itemOffered":{"@type":"Service","name":"Mannen - baard trimmen & contouren","description":"Mannen, een mooie baard heb je niet zomaar, die creëer je bij de barbier. Net zoals het haar op je hoofd, kun je ook je baard niet aan zijn lot over laten. Ontdek het effect van een transformerende trim en je zult zien hoe goed je baard er eigenlijk uit kan zien.","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT30M"}},"price":"15.00","priceCurrency":"EUR"},{"@type":"Offer","itemOffered":{"@type":"Service","name":"Mannen studenten - Knippen","description":"\nOnderschat nooit de waarde van een goed geknipt kapsel. Of je nu kort, lang, stijl of krullend haar hebt, de specialist helpt je bij het cre&euml;ren van het kapsel die het beste bij jou past. Zo wordt er door middel van verschillende technieken waaronder knippen, tondeuse en contouren de perfecte coupe aangemeten.\n\n","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT30M"}},"price":"24.00","priceCurrency":"EUR"},{"@type":"Offer","itemOffered":{"@type":"Service","name":"Mannen - Contouren","description":"\nBij contouren wordt de haarlijn van het kapsel bijgewerkt. Met gebruik van een tondeuse wordt de haarlijn getrimd. Contouren zorgt ervoor dat je coupe er weer wat verzorgder uitziet zonder een volledig knipbeurt te moeten ondergaan.\n\n","additionalProperty":{"@type":"PropertyValue","name":"Duration","value":"PT5M"}},"price":"5.00","priceCurrency":"EUR"}]}]},"url":"https://www.treatwell.nl/salon/utrecht-hairstyle/","name":"Utrecht Hairstyle","geo":{"@type":"GeoCoordinates","latitude":52.0936779,"longitude":5.1192412},"review":[{"@type":"Review","author":{"@type":"Person","name":"Rik"},"datePublished":"2026-06-04","reviewBody":"Altijd een mooi resultaat bij deze kapper. Vriendelijk personeel en altijd een bakkie koffie. Overdag is er eigenlijk altijd wel plek, koopavond of weekend even van te voren reserveren. Aanrader!","reviewRating":{"@type":"Rating","ratingValue":5},"publisher":{"@type":"Organization","name":"Treatwell"}},{"@type":"Review","author":{"@type":"Person","name":"Rik"},"datePublished":"2026-06-04","reviewBody":"Goede kapper en altijd mooi resultaat. vriendelijk personeel, altijd een bakje koffie.","reviewRating":{"@type":"Rating","ratingValue":5},"publisher":{"@type":"Organization","name":"Treatwell"}},{"@type":"Review","author":{"@type":"Person","name":"Anne"},"datePublished":"2026-05-30","reviewBody":"Echt ontzettend mooi gedaan! Zorgvuldig, aardig en wat advies gekregen.","reviewRating":{"@type":"Rating","ratingValue":4},"pu
